name: Text Encoding

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  utf8:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - uses: actions/checkout@v4
      - name: Check mojibake and UTF-8 encoding
        run: bash .github/scripts/check-text-encoding.sh
